<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .login-container {
            width: 400px;
            margin: 70px auto;
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            width: 100%;
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .message a {
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }

        .message a:hover {
            text-decoration: underline;
        }

        .flash-messages {
            list-style: none;
            padding: 10px;
            background-color: #ffe6e6;
            border: 1px solid #ff4d4d;
            border-radius: 6px;
            color: #cc0000;
            margin-bottom: 20px;
        }

        .password-toggle {
            position: absolute;
            top: 38px;
            right: 12px;
            cursor: pointer;
            user-select: none;
            color: #666;
            font-size: 14px;
        }

        .password-toggle:hover {
            color: #000;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Iniciar sesión</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="numeroidn">Número de Identificación:</label>
            <input type="text" id="numeroidn" name="numeroidn" required>
        </div>

        <div class="form-group">
            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" name="clave" required>
            <span class="password-toggle" onclick="togglePassword()">👁️</span>
        </div>

        <button type="submit">Iniciar sesión</button>
    </form>

    <p class="message">¿No estás registrado? <a href="{{ url_for('registrar') }}">Crea una cuenta</a></p>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById("clave");
        const toggle = document.querySelector(".password-toggle");
        if (input.type === "password") {
            input.type = "text";
            toggle.textContent = "🙈";
        } else {
            input.type = "password";
            toggle.textContent = "👁️";
        }
    }
</script>

</body>
</html>
