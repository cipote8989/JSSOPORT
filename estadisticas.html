<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas de Ganancias</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f9f5f0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 0 10px #0001; padding: 32px; }
        h1 { text-align: center; margin-bottom: 32px; }
        .stats { margin-bottom: 32px; }
        .stats label { font-weight: bold; display: block; margin-bottom: 6px; }
        .stats-value { font-size: 1.5rem; margin-bottom: 18px; }
        .calc-form { background: #f3f3f3; border-radius: 8px; padding: 18px; margin-bottom: 18px; }
        .calc-form label { display: block; margin-bottom: 4px; }
        .calc-form input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px; width: 100%; }
        .calc-form button { background: #2c2c2c; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 1rem; }
        .calc-form button:hover { background: #bfbfbf; color: #222; }
        .result { font-size: 1.2rem; margin-top: 10px; }
        .back-link { display: block; margin-top: 24px; text-align: center; }
        .back-link a { color: #2c2c2c; text-decoration: none; font-weight: bold; }
        .back-link a:hover { color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Estadísticas de Ganancias</h1>
        <div class="stats">
            <label>Dinero ganado hoy:</label>
            <div class="stats-value">${{ total_dia }}</div>
            <label>Dinero ganado esta semana:</label>
            <div class="stats-value">${{ total_semana }}</div>
            <label>Dinero ganado este mes:</label>
            <div class="stats-value">${{ total_mes }}</div>
            <label>Dinero ganado este año:</label>
            <div class="stats-value">${{ total_anio }}</div>
        </div>
        <div class="calc-form">
            <form method="POST">
                <label for="fecha_inicio">Fecha inicio:</label>
                <input type="date" name="fecha_inicio" id="fecha_inicio" value="{{ fecha_inicio or '' }}" required>
                <label for="fecha_fin">Fecha fin:</label>
                <input type="date" name="fecha_fin" id="fecha_fin" value="{{ fecha_fin or '' }}" required>
                <button type="submit">Calcular</button>
            </form>
            {% if total_intervalo is not none %}
                <div class="result">
                    <strong>Dinero ganado entre {{ fecha_inicio }} y {{ fecha_fin }}:</strong> ${{ total_intervalo }}
                </div>
            {% endif %}
        </div>
        <div class="back-link">
            <a href="{{ url_for('admin_inicio') }}">&larr; Volver al panel de administración</a>
        </div>
    </div>
</body>
</html>
