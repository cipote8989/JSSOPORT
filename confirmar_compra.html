<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Compra</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f9f5f0; }
        .container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 0 10px #0001; padding: 32px; }
        h1 { text-align: center; margin-bottom: 32px; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input[type="text"] { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #2c2c2c; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #bfbfbf; color: #222; }
        .msg { margin-top: 18px; text-align: center; font-weight: bold; color: #2980b9; }
        .back-link { display: block; margin-top: 24px; text-align: center; }
        .back-link a { color: #2c2c2c; text-decoration: none; font-weight: bold; }
        .back-link a:hover { color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Confirmar Compra</h1>
        <form method="POST">
            <label for="codigo_compra">Código de compra de la factura:</label>
            <input type="text" name="codigo_compra" id="codigo_compra" required maxlength="12">
            <button type="submit">Confirmar</button>
        </form>
        {% if mensaje %}
            <div class="msg">{{ mensaje }}</div>
        {% endif %}
        <div class="back-link">
            <a href="{{ url_for('admin_inicio') }}">&larr; Volver al panel de administración</a>
        </div>
    </div>
</body>
</html>
